<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级马里奥</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }
        
        .game-container {
            position: relative;
            border: 8px solid #5C2F0D;
            border-radius: 8px;
            box-shadow: 
                0 0 0 4px #3d1f08,
                0 0 40px rgba(229, 37, 33, 0.3),
                inset 0 0 60px rgba(0,0,0,0.3);
            background: #000;
        }
        
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        .controls-info {
            margin-top: 20px;
            color: #aaa;
            font-size: 10px;
            text-align: center;
            letter-spacing: 1px;
        }
        
        .controls-info span {
            color: #E52521;
            background: rgba(229, 37, 33, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
            margin: 0 4px;
        }

        .mobile-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 0 20px;
            justify-content: space-between;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(229, 37, 33, 0.8);
            border: 3px solid #fff;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            user-select: none;
        }

        .dpad {
            display: flex;
            gap: 10px;
        }

        .action-btns {
            display: flex;
            gap: 15px;
        }

        @media (max-width: 850px) {
            .game-container {
                border-width: 4px;
            }
            
            canvas {
                width: 100vw;
                max-width: 400px;
                height: auto;
            }
            
            .mobile-controls {
                display: flex;
            }
            
            .controls-info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div class="controls-info">
        <span>← →</span> 移动 
        <span>空格</span> 跳跃 
        <span>P</span> 暂停 
        <span>R</span> 重新开始
    </div>
    <div class="mobile-controls">
        <div class="dpad">
            <button class="mobile-btn" id="btnLeft">◀</button>
            <button class="mobile-btn" id="btnRight">▶</button>
        </div>
        <div class="action-btns">
            <button class="mobile-btn" id="btnJump">▲</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 5;
        const TILE_SIZE = 40;
        const LEVEL_WIDTH = 2400;

        const COLORS = {
            SKY: '#049CD8',
            GROUND: '#5C2F0D',
            GROUND_TOP: '#7CB342',
            BRICK: '#C84C0C',
            BRICK_DARK: '#A33D08',
            PIPE: '#00A64D',
            PIPE_DARK: '#007A33',
            MARIO_RED: '#E52521',
            MARIO_BROWN: '#8B4513',
            MARIO_SKIN: '#FFCC99',
            COIN: '#FFD700',
            COIN_DARK: '#DAA520',
            GOOMBA: '#8B4513',
            FLAG: '#00A64D',
            FLAG_TOP: '#FFD700'
        };

        const GameState = {
            START: 'start',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAMEOVER: 'gameover',
            VICTORY: 'victory'
        };

        let gameState = GameState.START;
        let camera = { x: 0 };
        let mario = null;
        let enemies = [];
        let coins = [];
        let platforms = [];
        let bricks = [];
        let pipes = [];
        let flagpole = null;
        let particles = [];
        let keys = {};
        let animationId = null;

        class Mario {
            constructor() {
                this.x = 100;
                this.y = 400;
                this.width = 32;
                this.height = 40;
                this.vx = 0;
                this.vy = 0;
                this.lives = 3;
                this.score = 0;
                this.coinCount = 0;
                this.isJumping = false;
                this.direction = 1;
                this.animFrame = 0;
                this.animTimer = 0;
                this.invincible = 0;
            }

            update() {
                if (keys['ArrowLeft'] || keys['a']) {
                    this.vx = -MOVE_SPEED;
                    this.direction = -1;
                } else if (keys['ArrowRight'] || keys['d']) {
                    this.vx = MOVE_SPEED;
                    this.direction = 1;
                } else {
                    this.vx = 0;
                }

                if ((keys['ArrowUp'] || keys[' '] || keys['w']) && !this.isJumping) {
                    this.vy = JUMP_FORCE;
                    this.isJumping = true;
                }

                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0) this.x = 0;
                if (this.x > LEVEL_WIDTH - this.width) this.x = LEVEL_WIDTH - this.width;

                if (this.y > canvas.height) {
                    this.lives--;
                    if (this.lives <= 0) {
                        gameState = GameState.GAMEOVER;
                    } else {
                        this.respawn();
                    }
                }

                if (this.invincible > 0) this.invincible--;

                this.animTimer++;
                if (this.animTimer > 8) {
                    this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 4;
                }
            }

            respawn() {
                this.x = 100;
                this.y = 400;
                this.vx = 0;
                this.vy = 0;
                this.invincible = 120;
                camera.x = 0;
            }

            draw() {
                if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) return;

                const sx = Math.floor(this.x - camera.x);
                const sy = Math.floor(this.y);

                ctx.save();
                ctx.translate(sx + this.width / 2, sy);
                ctx.scale(this.direction, 1);
                ctx.translate(-this.width / 2, 0);

                ctx.fillStyle = COLORS.MARIO_RED;
                ctx.fillRect(8, 0, 16, 12);
                ctx.fillRect(4, 12, 24, 16);

                ctx.fillStyle = COLORS.MARIO_BROWN;
                ctx.fillRect(4, 28, 8, 12);
                ctx.fillRect(20, 28, 8, 12);

                ctx.fillStyle = COLORS.MARIO_SKIN;
                ctx.fillRect(10, 12, 12, 8);

                ctx.fillStyle = '#000';
                ctx.fillRect(8, 4, 6, 4);
                ctx.fillRect(18, 4, 6, 4);

                ctx.fillStyle = '#fff';
                ctx.fillRect(9, 5, 2, 2);
                ctx.fillRect(19, 5, 2, 2);

                if (Math.abs(this.vx) > 0 && !this.isJumping) {
                    const legOffset = Math.sin(this.animFrame * Math.PI / 2) * 4;
                    ctx.fillStyle = COLORS.MARIO_RED;
                    ctx.fillRect(4, 32 + legOffset, 8, 8);
                    ctx.fillRect(20, 32 - legOffset, 8, 8);
                }

                ctx.restore();
            }
        }

        class Enemy {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 32;
                this.height = 32;
                this.vx = -1.5;
                this.active = true;
                this.animFrame = 0;
                this.animTimer = 0;
            }

            update() {
                this.x += this.vx;

                for (const platform of [...platforms, ...bricks]) {
                    if (this.checkCollision(platform)) {
                        if (this.vx < 0 && this.x < platform.x) {
                            this.vx = 1.5;
                        } else if (this.vx > 0 && this.x > platform.x) {
                            this.vx = -1.5;
                        }
                    }
                }

                for (const pipe of pipes) {
                    if (this.checkCollision(pipe)) {
                        if (this.vx < 0 && this.x < pipe.x) {
                            this.vx = 1.5;
                        } else if (this.vx > 0 && this.x > pipe.x) {
                            this.vx = -1.5;
                        }
                    }
                }

                if (this.y > canvas.height) {
                    this.active = false;
                }

                this.animTimer++;
                if (this.animTimer > 12) {
                    this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 2;
                }
            }

            checkCollision(obj) {
                return this.x < obj.x + obj.width &&
                       this.x + this.width > obj.x &&
                       this.y < obj.y + obj.height &&
                       this.y + this.height > obj.y;
            }

            draw() {
                const sx = Math.floor(this.x - camera.x);
                const sy = Math.floor(this.y);

                if (sx < -50 || sx > canvas.width + 50) return;

                ctx.fillStyle = COLORS.GOOMBA;
                ctx.beginPath();
                ctx.ellipse(sx + 16, sy + 20, 16, 14, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#654321';
                ctx.fillRect(sx + 4, sy + 10, 6, 6);
                ctx.fillRect(sx + 22, sy + 10, 6, 6);

                ctx.fillStyle = '#000';
                ctx.fillRect(sx + 5, sy + 11, 3, 3);
                ctx.fillRect(sx + 23, sy + 11, 3, 3);

                ctx.fillStyle = COLORS.GOOMBA;
                const footOffset = this.animFrame * 3;
                ctx.fillRect(sx + 2 - footOffset, sy + 26, 10, 6);
                ctx.fillRect(sx + 20 + footOffset, sy + 26, 10, 6);
            }
        }

        class Coin {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 24;
                this.height = 32;
                this.active = true;
                this.animFrame = 0;
                this.animTimer = 0;
                this.bounceOffset = 0;
            }

            update() {
                this.animTimer++;
                if (this.animTimer > 10) {
                    this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 4;
                }
                this.bounceOffset = Math.sin(this.animFrame * Math.PI / 2) * 2;
            }

            draw() {
                const sx = Math.floor(this.x - camera.x);
                const sy = Math.floor(this.y + this.bounceOffset);

                if (sx < -50 || sx > canvas.width + 50) return;

                const scaleX = Math.cos(this.animFrame * Math.PI / 2);
                
                ctx.fillStyle = COLORS.COIN;
                ctx.beginPath();
                ctx.ellipse(sx + 12, sy + 16, Math.abs(scaleX) * 10 + 2, 12, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = COLORS.COIN_DARK;
                ctx.beginPath();
                ctx.ellipse(sx + 12, sy + 16, Math.abs(scaleX) * 6, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                if (Math.abs(scaleX) > 0.3) {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.ellipse(sx + 8, sy + 12, 2, 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        class Brick {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = TILE_SIZE;
                this.height = TILE_SIZE;
            }

            draw() {
                const sx = Math.floor(this.x - camera.x);
                const sy = Math.floor(this.y);

                if (sx < -TILE_SIZE || sx > canvas.width) return;

                ctx.fillStyle = COLORS.BRICK;
                ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);

                ctx.fillStyle = COLORS.BRICK_DARK;
                ctx.fillRect(sx, sy, TILE_SIZE, 4);
                ctx.fillRect(sx, sy + TILE_SIZE - 4, TILE_SIZE, 4);
                ctx.fillRect(sx, sy, 4, TILE_SIZE);
                ctx.fillRect(sx + TILE_SIZE - 4, sy, 4, TILE_SIZE);

                ctx.fillStyle = '#8B0000';
                for (let i = 0; i < 4; i++) {
                    ctx.fillRect(sx + 4 + (i % 2) * 18, sy + 8 + Math.floor(i / 2) * 18, 14, 8);
                }
            }
        }

        class Pipe {
            constructor(x, height) {
                this.x = x;
                this.y = canvas.height - TILE_SIZE * 2 - height;
                this.width = TILE_SIZE * 2;
                this.height = height + TILE_SIZE * 2;
            }

            draw() {
                const sx = Math.floor(this.x - camera.x);
                const sy = Math.floor(this.y);

                if (sx < -this.width || sx > canvas.width) return;

                ctx.fillStyle = COLORS.PIPE;
                ctx.fillRect(sx, sy + 20, this.width, this.height - 20);
                ctx.fillRect(sx - 8, sy, this.width + 16, 24);

                ctx.fillStyle = COLORS.PIPE_DARK;
                ctx.fillRect(sx, sy + this.height - 8, this.width, 8);
                ctx.fillRect(sx - 8, sy + 16, this.width + 16, 8);

                ctx.fillStyle = '#80FFB0';
                ctx.fillRect(sx - 4, sy + 4, 8, 8);
                ctx.fillRect(sx + this.width - 4, sy + 4, 8, 8);
            }
        }

        class Platform {
            constructor(x, y, width) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = TILE_SIZE;
            }

            draw() {
                const sx = Math.floor(this.x - camera.x);
                const sy = Math.floor(this.y);

                if (sx + this.width < 0 || sx > canvas.width) return;

                for (let i = 0; i < this.width / TILE_SIZE; i++) {
                    ctx.fillStyle = COLORS.BRICK;
                    ctx.fillRect(sx + i * TILE_SIZE, sy, TILE_SIZE, TILE_SIZE);

                    ctx.fillStyle = COLORS.BRICK_DARK;
                    ctx.fillRect(sx + i * TILE_SIZE, sy, TILE_SIZE, 4);
                    ctx.fillRect(sx + i * TILE_SIZE, sy + TILE_SIZE - 4, TILE_SIZE, 4);
                    ctx.fillRect(sx + i * TILE_SIZE, sy, 4, TILE_SIZE);
                    ctx.fillRect(sx + i * TILE_SIZE + TILE_SIZE - 4, sy, 4, TILE_SIZE);

                    ctx.fillStyle = '#8B0000';
                    ctx.fillRect(sx + i * TILE_SIZE + 4, sy + 8, 14, 8);
                    ctx.fillRect(sx + i * TILE_SIZE + 22, sy + 22, 14, 8);
                }
            }
        }

        class Flagpole {
            constructor(x) {
                this.x = x;
                this.y = canvas.height - TILE_SIZE * 6;
                this.width = 16;
                this.height = TILE_SIZE * 6;
            }

            draw() {
                const sx = Math.floor(this.x - camera.x);
                const sy = Math.floor(this.y);

                if (sx < -50 || sx > canvas.width + 50) return;

                ctx.fillStyle = '#666';
                ctx.fillRect(sx, sy, 8, this.height);

                ctx.fillStyle = COLORS.FLAG;
                ctx.beginPath();
                ctx.moveTo(sx + 8, sy);
                ctx.lineTo(sx + 60, sy + 20);
                ctx.lineTo(sx + 8, sy + 40);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = COLORS.FLAG_TOP;
                ctx.beginPath();
                ctx.arc(sx + 4, sy - 8, 12, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = -Math.random() * 8 - 2;
                this.color = color;
                this.life = 60;
                this.size = Math.random() * 4 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.3;
                this.life--;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / 60;
                ctx.fillRect(this.x - camera.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        function createLevel() {
            platforms = [];
            bricks = [];
            pipes = [];
            enemies = [];
            coins = [];
            particles = [];

            for (let x = 0; x < LEVEL_WIDTH; x += TILE_SIZE) {
                platforms.push(new Platform(x, canvas.height - TILE_SIZE * 2, TILE_SIZE));
            }

            bricks.push(new Brick(240, canvas.height - TILE_SIZE * 5));
            bricks.push(new Brick(280, canvas.height - TILE_SIZE * 5));
            bricks.push(new Brick(320, canvas.height - TILE_SIZE * 5));

            coins.push(new Coin(252, canvas.height - TILE_SIZE * 6));
            coins.push(new Coin(292, canvas.height - TILE_SIZE * 6));
            coins.push(new Coin(332, canvas.height - TILE_SIZE * 6));

            bricks.push(new Brick(480, canvas.height - TILE_SIZE * 4));
            bricks.push(new Brick(520, canvas.height - TILE_SIZE * 4));
            bricks.push(new Brick(560, canvas.height - TILE_SIZE * 4));
            bricks.push(new Brick(600, canvas.height - TILE_SIZE * 4));

            coins.push(new Coin(492, canvas.height - TILE_SIZE * 5));
            coins.push(new Coin(532, canvas.height - TILE_SIZE * 5));
            coins.push(new Coin(572, canvas.height - TILE_SIZE * 5));
            coins.push(new Coin(612, canvas.height - TILE_SIZE * 5));

            pipes.push(new Pipe(700, TILE_SIZE));
            pipes.push(new Pipe(850, TILE_SIZE * 2));

            bricks.push(new Brick(950, canvas.height - TILE_SIZE * 6));
            bricks.push(new Brick(990, canvas.height - TILE_SIZE * 6));
            bricks.push(new Brick(1030, canvas.height - TILE_SIZE * 6));

            coins.push(new Coin(962, canvas.height - TILE_SIZE * 7));
            coins.push(new Coin(1002, canvas.height - TILE_SIZE * 7));
            coins.push(new Coin(1042, canvas.height - TILE_SIZE * 7));

            pipes.push(new Pipe(1150, TILE_SIZE * 3));

            platforms.push(new Platform(1300, canvas.height - TILE_SIZE * 5, TILE_SIZE * 4));
            coins.push(new Coin(1320, canvas.height - TILE_SIZE * 6));
            coins.push(new Coin(1360, canvas.height - TILE_SIZE * 6));
            coins.push(new Coin(1400, canvas.height - TILE_SIZE * 6));

            bricks.push(new Brick(1550, canvas.height - TILE_SIZE * 5));
            bricks.push(new Brick(1590, canvas.height - TILE_SIZE * 5));
            bricks.push(new Brick(1630, canvas.height - TILE_SIZE * 5));
            bricks.push(new Brick(1670, canvas.height - TILE_SIZE * 5));

            coins.push(new Coin(1562, canvas.height - TILE_SIZE * 6));
            coins.push(new Coin(1602, canvas.height - TILE_SIZE * 6));
            coins.push(new Coin(1642, canvas.height - TILE_SIZE * 6));
            coins.push(new Coin(1682, canvas.height - TILE_SIZE * 6));

            pipes.push(new Pipe(1800, TILE_SIZE * 2));
            pipes.push(new Pipe(1950, TILE_SIZE));

            platforms.push(new Platform(2050, canvas.height - TILE_SIZE * 4, TILE_SIZE * 3));
            coins.push(new Coin(2070, canvas.height - TILE_SIZE * 5));
            coins.push(new Coin(2110, canvas.height - TILE_SIZE * 5));

            enemies.push(new Enemy(400, canvas.height - TILE_SIZE * 3));
            enemies.push(new Enemy(800, canvas.height - TILE_SIZE * 3));
            enemies.push(new Enemy(1200, canvas.height - TILE_SIZE * 3));
            enemies.push(new Enemy(1600, canvas.height - TILE_SIZE * 3));
            enemies.push(new Enemy(2000, canvas.height - TILE_SIZE * 3));

            flagpole = new Flagpole(LEVEL_WIDTH - 200);
        }

        function initGame() {
            mario = new Mario();
            createLevel();
            camera.x = 0;
        }

        function checkCollisions() {
            const allPlatforms = [...platforms, ...bricks, ...pipes];
            
            for (const platform of allPlatforms) {
                if (mario.checkCollision(platform)) {
                    const overlapX = Math.min(mario.x + mario.width - platform.x, platform.x + platform.width - mario.x);
                    const overlapY = Math.min(mario.y + mario.height - platform.y, platform.y + platform.height - mario.y);

                    if (overlapY < overlapX) {
                        if (mario.vy > 0 && mario.y + mario.height - mario.vy <= platform.y + 10) {
                            mario.y = platform.y - mario.height;
                            mario.vy = 0;
                            mario.isJumping = false;
                        } else if (mario.vy < 0) {
                            mario.y = platform.y + platform.height;
                            mario.vy = 0;
                        }
                    } else {
                        if (mario.vx > 0) {
                            mario.x = platform.x - mario.width;
                        } else if (mario.vx < 0) {
                            mario.x = platform.x + platform.width;
                        }
                        mario.vx = 0;
                    }
                }
            }

            for (const enemy of enemies) {
                if (!enemy.active) continue;
                if (mario.checkCollision(enemy)) {
                    if (mario.vy > 0 && mario.y + mario.height - mario.vy <= enemy.y + 10) {
                        enemy.active = false;
                        mario.vy = JUMP_FORCE * 0.6;
                        mario.score += 100;
                        for (let i = 0; i < 8; i++) {
                            particles.push(new Particle(enemy.x + 16, enemy.y, COLORS.GOOMBA));
                        }
                    } else if (mario.invincible === 0) {
                        mario.lives--;
                        mario.invincible = 120;
                        mario.vx = -mario.direction * 5;
                        mario.vy = -8;
                        if (mario.lives <= 0) {
                            gameState = GameState.GAMEOVER;
                        }
                    }
                }
            }

            for (const coin of coins) {
                if (!coin.active) continue;
                if (mario.checkCollision(coin)) {
                    coin.active = false;
                    mario.coinCount++;
                    mario.score += 50;
                    for (let i = 0; i < 6; i++) {
                        particles.push(new Particle(coin.x + 12, coin.y + 16, COLORS.COIN));
                    }
                }
            }

            if (flagpole && mario.checkCollision(flagpole)) {
                gameState = GameState.VICTORY;
                mario.score += 1000;
            }
        }

        Mario.prototype.checkCollision = function(obj) {
            return this.x < obj.x + obj.width &&
                   this.x + this.width > obj.x &&
                   this.y < obj.y + obj.height &&
                   this.y + this.height > obj.y;
        };

        function update() {
            if (gameState !== GameState.PLAYING) return;

            mario.update();
            
            camera.x = Math.max(0, Math.min(mario.x - canvas.width / 3, LEVEL_WIDTH - canvas.width));

            for (const enemy of enemies) {
                if (enemy.active) enemy.update();
            }

            for (const coin of coins) {
                if (coin.active) coin.update();
            }

            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });

            checkCollisions();
        }

        function drawBackground() {
            ctx.fillStyle = COLORS.SKY;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cloudOffset = camera.x * 0.2;
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 8; i++) {
                const cx = (i * 350 - cloudOffset) % (canvas.width + 200) - 100;
                const cy = 60 + (i % 3) * 50;
                ctx.beginPath();
                ctx.arc(cx, cy, 30, 0, Math.PI * 2);
                ctx.arc(cx + 30, cy - 10, 25, 0, Math.PI * 2);
                ctx.arc(cx + 60, cy, 30, 0, Math.PI * 2);
                ctx.arc(cx + 30, cy + 10, 20, 0, Math.PI * 2);
                ctx.fill();
            }

            const hillOffset = camera.x * 0.4;
            ctx.fillStyle = '#228B22';
            for (let i = 0; i < 6; i++) {
                const hx = (i * 400 - hillOffset) % (canvas.width + 300) - 150;
                ctx.beginPath();
                ctx.arc(hx, canvas.height - TILE_SIZE * 2, 120, Math.PI, 0);
                ctx.fill();
            }
        }

        function drawGround() {
            ctx.fillStyle = COLORS.GROUND;
            ctx.fillRect(0, canvas.height - TILE_SIZE * 2, canvas.width, TILE_SIZE * 2);
            
            ctx.fillStyle = COLORS.GROUND_TOP;
            ctx.fillRect(0, canvas.height - TILE_SIZE * 2, canvas.width, 8);

            ctx.fillStyle = COLORS.GROUND;
            const groundOffset = camera.x % TILE_SIZE;
            for (let x = -groundOffset; x < canvas.width; x += TILE_SIZE) {
                ctx.fillRect(x, canvas.height - TILE_SIZE * 2 + 12, 2, TILE_SIZE * 2 - 12);
            }
        }

        function drawHUD() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, 50);

            ctx.font = '16px "Press Start 2P", monospace';
            ctx.fillStyle = '#fff';
            ctx.fillText(`金币: ${mario.coinCount}`, 20, 32);
            ctx.fillText(`分数: ${mario.score}`, 200, 32);

            ctx.fillStyle = COLORS.MARIO_RED;
            ctx.fillText('♥', canvas.width - 120, 32);
            ctx.fillStyle = '#fff';
            ctx.fillText(`x ${mario.lives}`, canvas.width - 80, 32);
        }

        function drawStartScreen() {
            ctx.fillStyle = COLORS.SKY;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = '48px "Press Start 2P", monospace';
            ctx.fillStyle = COLORS.MARIO_RED;
            ctx.textAlign = 'center';
            ctx.fillText('SUPER', canvas.width / 2, 180);
            
            ctx.fillStyle = COLORS.COIN;
            ctx.fillText('MARIO', canvas.width / 2, 250);

            ctx.font = '20px "Press Start 2P", monospace';
            ctx.fillStyle = '#fff';
            ctx.fillText('点击开始游戏', canvas.width / 2, 380);

            ctx.font = '12px "Press Start 2P", monospace';
            ctx.fillStyle = '#aaa';
            ctx.fillText('按 ← → 移动，空格跳跃', canvas.width / 2, 450);

            ctx.textAlign = 'left';

            const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
            ctx.globalAlpha = pulse;
            ctx.fillStyle = COLORS.COIN;
            ctx.font = '24px "Press Start 2P", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('▶', canvas.width / 2, 380);
            ctx.globalAlpha = 1;
            ctx.textAlign = 'left';
        }

        function drawPauseScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = '36px "Press Start 2P", monospace';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText('暂停', canvas.width / 2, canvas.height / 2 - 20);

            ctx.font = '16px "Press Start 2P", monospace';
            ctx.fillStyle = '#aaa';
            ctx.fillText('按 P 继续', canvas.width / 2, canvas.height / 2 + 30);
            ctx.textAlign = 'left';
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = '40px "Press Start 2P", monospace';
            ctx.fillStyle = COLORS.MARIO_RED;
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 60);

            ctx.font = '20px "Press Start 2P", monospace';
            ctx.fillStyle = COLORS.COIN;
            ctx.fillText(`最终分数: ${mario.score}`, canvas.width / 2, canvas.height / 2);
            ctx.fillText(`金币: ${mario.coinCount}`, canvas.width / 2, canvas.height / 2 + 40);

            ctx.font = '16px "Press Start 2P", monospace';
            ctx.fillStyle = '#fff';
            ctx.fillText('按 R 重新开始', canvas.width / 2, canvas.height / 2 + 100);
            ctx.textAlign = 'left';
        }

        function drawVictory() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = '40px "Press Start 2P", monospace';
            ctx.fillStyle = COLORS.COIN;
            ctx.textAlign = 'center';
            ctx.fillText('恭喜通关!', canvas.width / 2, canvas.height / 2 - 60);

            ctx.font = '20px "Press Start 2P", monospace';
            ctx.fillStyle = '#fff';
            ctx.fillText(`最终分数: ${mario.score}`, canvas.width / 2, canvas.height / 2);
            ctx.fillText(`金币: ${mario.coinCount}`, canvas.width / 2, canvas.height / 2 + 40);

            ctx.font = '16px "Press Start 2P", monospace';
            ctx.fillStyle = '#aaa';
            ctx.fillText('按 R 重新开始', canvas.width / 2, canvas.height / 2 + 100);
            ctx.textAlign = 'left';
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === GameState.START) {
                drawStartScreen();
                return;
            }

            drawBackground();
            drawGround();

            for (const brick of bricks) brick.draw();
            for (const pipe of pipes) pipe.draw();
            for (const platform of platforms) platform.draw();
            if (flagpole) flagpole.draw();

            for (const coin of coins) {
                if (coin.active) coin.draw();
            }

            for (const enemy of enemies) {
                if (enemy.active) enemy.draw();
            }

            for (const particle of particles) particle.draw();

            mario.draw();

            drawHUD();

            if (gameState === GameState.PAUSED) {
                drawPauseScreen();
            } else if (gameState === GameState.GAMEOVER) {
                drawGameOver();
            } else if (gameState === GameState.VICTORY) {
                drawVictory();
            }
        }

        function gameLoop() {
            update();
            render();
            animationId = requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (e.key === 'p' || e.key === 'P') {
                if (gameState === GameState.PLAYING) {
                    gameState = GameState.PAUSED;
                } else if (gameState === GameState.PAUSED) {
                    gameState = GameState.PLAYING;
                }
            }
            
            if (e.key === 'r' || e.key === 'R') {
                if (gameState === GameState.GAMEOVER || gameState === GameState.VICTORY) {
                    initGame();
                    gameState = GameState.PLAYING;
                }
            }

            if (e.key === ' ') e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('click', () => {
            if (gameState === GameState.START) {
                initGame();
                gameState = GameState.PLAYING;
            }
        });

        document.getElementById('btnLeft').addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys['ArrowLeft'] = true;
        });
        document.getElementById('btnLeft').addEventListener('touchend', () => {
            keys['ArrowLeft'] = false;
        });
        document.getElementById('btnRight').addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys['ArrowRight'] = true;
        });
        document.getElementById('btnRight').addEventListener('touchend', () => {
            keys['ArrowRight'] = false;
        });
        document.getElementById('btnJump').addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys[' '] = true;
        });
        document.getElementById('btnJump').addEventListener('touchend', () => {
            keys[' '] = false;
        });

        initGame();
        gameLoop();
    </script>
</body>
</html>
